<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Usage Dashboard</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="dashboard.css" />
  </head>
  <body>
    <header class="dash-header">
      <div class="dash-title" data-i18n="dashboard.title">Usage Dashboard</div>
      <div class="dash-header-actions">
        <button id="themeToggle" class="icon-button" title="Theme">◐</button>
        <button id="refreshBtn" class="icon-button" title="Refresh">↻</button>
        <button id="minBtn" class="icon-button" title="Minimize">−</button>
        <button id="closeBtn" class="icon-button" title="Close">×</button>
      </div>
    </header>

    <nav class="dash-tabs">
      <button id="activityTab" class="dash-tab active" data-tab="activity" data-i18n="dashboard.tab.activity">Overview</button>
      <button id="trendsTab" class="dash-tab" data-tab="trends" data-i18n="dashboard.tab.trends">Trends</button>
      <button id="rateTab" class="dash-tab" data-tab="rate" data-i18n="dashboard.tab.rate">Rate</button>
    </nav>

    <section id="ratePane" class="dash-pane hidden">
      <div class="dash-controls">
        <div class="dash-control-row">
          <div class="seg" data-control="rateMetric">
            <button class="seg-btn active" data-metric="total" data-i18n="dashboard.rate.total">Tokens/min</button>
            <button class="seg-btn" data-metric="cost" data-i18n="dashboard.rate.cost">Cost/min</button>
            <button class="seg-btn" data-metric="output" data-i18n="dashboard.rate.output">Output/min</button>
          </div>
          <div class="seg" data-control="rateGran">
            <button class="seg-btn active" data-gran="0" data-i18n="dashboard.rate.gran.auto">Auto</button>
            <button class="seg-btn" data-gran="30000" data-i18n="dashboard.rate.gran.30s">30s</button>
            <button class="seg-btn" data-gran="60000" data-i18n="dashboard.rate.gran.1m">1m</button>
            <button class="seg-btn" data-gran="300000" data-i18n="dashboard.rate.gran.5m">5m</button>
            <button class="seg-btn" data-gran="900000" data-i18n="dashboard.rate.gran.15m">15m</button>
            <button class="seg-btn" data-gran="3600000" data-i18n="dashboard.rate.gran.1h">1h</button>
          </div>
          <div id="rateRangeSelect" class="dash-range-group"></div>
        </div>
      </div>
      <div id="rateChart" class="dash-chart-wrap"></div>
      <div id="rateEmpty" class="trends-empty hidden" data-i18n="dashboard.rate.empty">No samples yet — leave the widget running to build the rate graph.</div>
    </section>

    <section id="trendsPane" class="dash-pane hidden">
      <div class="dash-controls">
        <div class="dash-control-row">
          <div class="seg" data-control="stack">
            <button class="seg-btn active" data-stack="client" data-i18n="dashboard.stack.client">By tool</button>
            <button class="seg-btn" data-stack="model" data-i18n="dashboard.stack.model">By model</button>
          </div>
          <div class="seg" data-control="mode">
            <button class="seg-btn active" data-mode="bars" data-i18n="dashboard.mode.bars">Bars</button>
            <button class="seg-btn" data-mode="kline" data-i18n="dashboard.mode.kline">K-line</button>
          </div>
          <div id="rangeSelect" class="dash-range-group"></div>
        </div>
      </div>
      <div id="dashChart" class="dash-chart-wrap"></div>
      <div id="dashLegend" class="dash-legend"></div>
    </section>

    <section id="activityPane" class="dash-pane">
      <div id="dashCards" class="dash-cards"></div>
      <div class="dash-heatmap-block">
        <div class="dash-heatmap-title" data-i18n="dashboard.heatmap.title">Token Activity</div>
        <div id="dashHeatmap" class="dash-heatmap-wrap"></div>
      </div>
      <div id="dashBreakdown" class="dash-breakdown"></div>
    </section>

    <div id="dashEmpty" class="dash-empty hidden" data-i18n="dashboard.empty">No usage history yet</div>
    <div id="dashTooltip" class="dash-tooltip hidden"></div>

    <script src="usageCharts.js"></script>
    <script src="themePresets.js"></script>
    <script src="i18n.js"></script>
    <script src="../../shared/currency.js"></script>
    <script src="dashboard.js"></script>
  </body>
</html>
